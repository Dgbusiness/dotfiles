# Barra de estado arriba con pestañas visibles
set -g status-position top
set -g status-style bg=black,fg=white

# Pestaña activa resaltada
setw -g window-status-current-style bg=blue,fg=white,bold
setw -g window-status-current-format " #I:#W "
setw -g window-status-format " #I:#W "

# Mouse habilitado (click en pestañas)
set -g mouse on

# Numeración desde 1
set -g base-index 1
setw -g pane-base-index 1  # panes también desde 1
set -g renumber-windows on # renumera automáticamente al cerrar una pestaña

# Cerrar sesión completa al salir de la última ventana
set -g remain-on-exit off
